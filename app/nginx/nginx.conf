upstream fastapi {
    server app:8000;
}

server {
    listen 80;

    # 타임세일 엔드포인트 — 타임아웃 짧게 (빠른 실패)
    location /timesale {
        proxy_pass         http://fastapi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # 주문 엔드포인트 — 타임아웃 넉넉하게 (트랜잭션)
    location /orders {
        proxy_pass         http://fastapi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # 나머지 전체
    location / {
        proxy_pass         http://fastapi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ALB 헬스체크
    location /health {
        proxy_pass http://fastapi/health;
        access_log off;   # 헬스체크 로그 노이즈 제거
    }
}
