name: "App Deploy"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "배포 사유"
        required: false
        default: "Update app"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Start Instance Refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name infraboy-asg \
            --preferences MinHealthyPercentage=50,InstanceWarmup=60 \
            --query 'InstanceRefreshId' --output text)

          echo "REFRESH_ID=$REFRESH_ID" >> $GITHUB_ENV
          echo "🚀 배포 시작: $REFRESH_ID"

      - name: Wait for Completion
        timeout-minutes: 15
        run: |
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name infraboy-asg \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].Status' --output text)

            PERCENT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name infraboy-asg \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].PercentageComplete' --output text)

            echo "[$(date +%H:%M:%S)] 상태: $STATUS ($PERCENT%)"

            case $STATUS in
              Successful) echo "✅ 완료!"; exit 0 ;;
              Failed|Cancelled) echo "❌ 실패"; exit 1 ;;
            esac

            sleep 20
          done

      - name: Verify Health
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names infraboy-alb \
            --query 'LoadBalancers[0].DNSName' --output text)

          echo "ALB: http://$ALB_DNS"
          curl -f http://$ALB_DNS/health || exit 1
          echo "✅ 앱 정상 동작 확인!"
