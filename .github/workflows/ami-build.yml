name: "AMI Build"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ami-build
  cancel-in-progress: false

jobs:
  build_ami:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Packer Init
        working-directory: packer
        run: packer init .

      - name: Packer Validate
        working-directory: packer
        run: packer validate -var "tailscale_authkey=validate-only" .

      - name: Packer Build
        working-directory: packer
        env:
          PKR_VAR_tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: packer build . 2>&1 | tee packer-output.log

      - name: Debug Packer Output
        if: always()
        working-directory: packer
        run: |
          echo "=== Packer 로그 마지막 30줄 ==="
          tail -30 packer-output.log || echo "로그 파일 없음"

      - name: Extract AMI ID
        id: ami
        working-directory: packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          if [ -z "$AMI_ID" ]; then
            echo "::error::AMI ID 추출 실패"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "✅ 생성된 AMI ID: $AMI_ID"

      - name: Update Terraform tfvars
        run: |
          AMI_ID="${{ steps.ami.outputs.ami_id }}"
          FILE="terraform/ami.auto.tfvars"

          mkdir -p terraform
          touch $FILE

          sed -i "/^ami_id/d" $FILE
          echo "ami_id = \"${AMI_ID}\"" >> $FILE

          echo "📝 업데이트된 tfvars:"
          cat $FILE

      - name: Commit AMI ID
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add terraform/ami.auto.tfvars

          if git diff --cached --quiet; then
            echo "변경사항 없음. 커밋 스킵."
          else
            git commit -m "ci: update AMI ID to ${{ steps.ami.outputs.ami_id }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
            echo "✅ AMI ID 커밋 완료"
          fi

      - name: Send Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📦 [AMI 빌드 완료]
            - AMI ID: ${{ steps.ami.outputs.ami_id }}
            - 트리거: ${{ github.actor }}

            tfvars가 자동 업데이트되었습니다.
            인프라 반영을 원하시면 infra-deploy 워크플로우를 수동 실행하십시오.

      - name: Send Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ [AMI 빌드 실패]
            - 실행자: ${{ github.actor }}
            GitHub Actions 로그를 확인하십시오.
