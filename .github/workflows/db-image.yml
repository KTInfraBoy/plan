name: "DB Image Build & Push"

on:
  push:
    branches: ["master"]
    paths:
      - "app/src/init_db.sql"
      - "app/Dockerfile.db"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DB 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile.db
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/infraboy-db:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/infraboy-db:${{ github.sha }}

      - name: Send Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🗄️ [DB 이미지 빌드 완료]
            - 이미지: ${{ secrets.DOCKERHUB_USERNAME }}/infraboy-db:latest
            - 트리거: ${{ github.actor }}
            - init_db.sql 스키마가 반영됐습니다.

      - name: Send Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ [DB 이미지 빌드 실패]
            - 실행자: ${{ github.actor }}
            GitHub Actions 로그를 확인하십시오.
